<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ODT Manifest — Dispatch Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1A1D29;
    --paper:#F7F5F0;
    --paper-raised:#FFFFFF;
    --paper-dim:#EDEAE2;
    --line:#D8D3C6;
    --line-strong:#B5AE9C;
    --stamp-orange:#E8622C;
    --stamp-orange-dark:#B8481C;
    --stamp-green:#2D6E4E;
    --stamp-green-dark:#1E4D36;
    --stamp-red:#C9402F;
    --stamp-red-dark:#992F22;
    --muted:#9A9486;
    --muted-dark:#6B6759;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',-apple-system,sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  #app{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    background:var(--paper);
    position:relative;
    padding-bottom:90px;
  }
  .mono{font-family:'JetBrains Mono',monospace;}

  /* Header */
  .topbar{
    background:var(--ink);
    color:var(--paper);
    padding:18px 20px 16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    position:sticky;
    top:0;
    z-index:40;
  }
  .topbar .brand{display:flex;align-items:center;gap:10px;}
  .topbar .brand-mark{
    width:30px;height:30px;
    border:1.5px solid var(--stamp-orange);
    border-radius:4px;
    display:flex;align-items:center;justify-content:center;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;font-weight:700;
    color:var(--stamp-orange);
    transform:rotate(-4deg);
    flex-shrink:0;
  }
  .topbar .title{font-size:15px;font-weight:600;letter-spacing:0.2px;}
  .topbar .subtitle{font-size:11px;color:#9A9486;font-family:'JetBrains Mono',monospace;margin-top:1px;}
  .topbar .user-pill{
    font-size:11px;
    color:var(--paper);
    background:rgba(255,255,255,0.08);
    border:0.5px solid rgba(255,255,255,0.2);
    padding:5px 10px;
    border-radius:20px;
    font-family:'JetBrains Mono',monospace;
    display:flex;align-items:center;gap:6px;
    cursor:pointer;
  }

  .content{padding:18px 16px 24px;}

  /* Login screen */
  .login-wrap{
    min-height:90vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:24px;
  }
  .login-mark{
    width:64px;height:64px;
    border:2px solid var(--stamp-orange);
    border-radius:8px;
    display:flex;align-items:center;justify-content:center;
    font-family:'JetBrains Mono',monospace;
    font-size:22px;font-weight:700;
    color:var(--stamp-orange);
    transform:rotate(-5deg);
    margin:0 auto 18px;
  }
  .login-title{font-size:22px;font-weight:700;text-align:center;margin:0 0 4px;}
  .login-sub{font-size:13px;color:var(--muted-dark);text-align:center;margin:0 0 32px;font-family:'JetBrains Mono',monospace;}
  .role-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px;}
  .role-card{
    background:var(--paper-raised);
    border:1px solid var(--line);
    border-radius:10px;
    padding:18px 12px;
    text-align:center;
    cursor:pointer;
    transition:border-color .15s, transform .1s;
  }
  .role-card:active{transform:scale(0.97);}
  .role-card.selected{border-color:var(--stamp-orange);border-width:2px;background:#FFF8F4;}
  .role-card .ricon{font-size:22px;margin-bottom:8px;display:block;}
  .role-card .rname{font-size:13px;font-weight:600;}
  .role-card .rdesc{font-size:11px;color:var(--muted-dark);margin-top:2px;}

  label.field-label{
    font-size:11px;font-weight:600;color:var(--muted-dark);
    text-transform:uppercase;letter-spacing:0.6px;
    display:block;margin-bottom:6px;
  }
  select, input[type=text], input[type=password]{
    width:100%;
    padding:12px 14px;
    border:1px solid var(--line-strong);
    border-radius:8px;
    background:var(--paper-raised);
    font-size:15px;
    color:var(--ink);
    font-family:'Inter',sans-serif;
    margin-bottom:16px;
  }
  select:focus, input:focus{outline:2px solid var(--stamp-orange);outline-offset:0;}

  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    width:100%;
    padding:14px 16px;
    border-radius:8px;
    border:none;
    font-size:15px;font-weight:600;
    cursor:pointer;
    font-family:'Inter',sans-serif;
    transition:transform .1s, opacity .15s;
  }
  .btn:active{transform:scale(0.98);}
  .btn:disabled{opacity:0.4;cursor:not-allowed;}
  .btn-primary{background:var(--ink);color:var(--paper);}
  .btn-stamp{background:var(--stamp-orange);color:#fff;}
  .btn-green{background:var(--stamp-green);color:#fff;}
  .btn-outline{background:transparent;color:var(--ink);border:1.5px solid var(--ink);}
  .btn-ghost{background:transparent;color:var(--muted-dark);border:1px solid var(--line);}
  .btn-danger-outline{background:transparent;color:var(--stamp-red);border:1.5px solid var(--stamp-red);}
  .btn-sm{padding:9px 14px;font-size:13px;width:auto;}

  /* Tab bar */
  .tabbar{
    position:fixed;
    bottom:0;left:0;right:0;
    max-width:480px;
    margin:0 auto;
    background:var(--paper-raised);
    border-top:1px solid var(--line);
    display:flex;
    z-index:50;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .tab-item{
    flex:1;
    display:flex;flex-direction:column;align-items:center;gap:4px;
    padding:10px 4px 8px;
    cursor:pointer;
    color:var(--muted);
    font-size:10.5px;
    font-weight:600;
    border-top:2px solid transparent;
  }
  .tab-item.active{color:var(--stamp-orange);border-top-color:var(--stamp-orange);}
  .tab-item .ticon{font-size:19px;}

  /* Section heading */
  .section-head{display:flex;align-items:baseline;justify-content:space-between;margin:6px 0 14px;}
  .section-head h2{font-size:17px;font-weight:700;margin:0;}
  .section-head .count{font-size:12px;color:var(--muted-dark);font-family:'JetBrains Mono',monospace;}

  /* ODT Ticket card */
  .ticket{
    background:var(--paper-raised);
    border:1px solid var(--line);
    border-radius:10px;
    margin-bottom:12px;
    overflow:hidden;
    position:relative;
    cursor:pointer;
  }
  .ticket:active{transform:scale(0.99);}
  .ticket-top{
    padding:14px 14px 12px;
    display:flex;justify-content:space-between;align-items:flex-start;
  }
  .ticket-odt{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;letter-spacing:0.5px;}
  .ticket-route{font-size:12.5px;color:var(--muted-dark);margin-top:4px;}
  .status-chip{
    font-size:10.5px;font-weight:700;
    padding:4px 9px;
    border-radius:20px;
    text-transform:uppercase;
    letter-spacing:0.4px;
    white-space:nowrap;
    flex-shrink:0;
    margin-left:10px;
  }
  .status-created{background:#EDEAE2;color:var(--muted-dark);}
  .status-loaded{background:#FCE9DE;color:var(--stamp-orange-dark);}
  .status-delivered{background:#E1EFE6;color:var(--stamp-green-dark);}
  .status-discrepancy{background:#FBE3E0;color:var(--stamp-red-dark);}
  .ticket-tear{
    border-top:1.5px dashed var(--line-strong);
    margin:0 14px;
  }
  .ticket-bottom{
    padding:10px 14px 13px;
    display:flex;justify-content:space-between;
    font-size:11.5px;
    color:var(--muted-dark);
    font-family:'JetBrains Mono',monospace;
  }

  .empty-state{
    text-align:center;
    padding:50px 20px;
    color:var(--muted-dark);
  }
  .empty-state .eicon{font-size:32px;margin-bottom:10px;display:block;opacity:0.5;}
  .empty-state .etitle{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:4px;}
  .empty-state .edesc{font-size:12.5px;}

  /* Detail view timeline (signature stamp element) */
  .detail-header{
    display:flex;align-items:center;gap:10px;margin-bottom:4px;
  }
  .back-btn{
    background:none;border:none;color:var(--ink);font-size:20px;cursor:pointer;padding:4px;line-height:1;
  }
  .detail-odt{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;}
  .detail-meta-row{
    display:flex;justify-content:space-between;
    font-size:13px;color:var(--muted-dark);
    margin:14px 0 22px;
    padding-bottom:14px;
    border-bottom:1px solid var(--line);
  }
  .timeline{position:relative;padding-left:30px;}
  .timeline::before{
    content:'';
    position:absolute;left:9px;top:6px;bottom:6px;
    width:2px;background:var(--line);
  }
  .tl-step{position:relative;margin-bottom:26px;}
  .tl-dot{
    position:absolute;left:-30px;top:0;
    width:20px;height:20px;border-radius:50%;
    background:var(--paper-dim);
    border:2px solid var(--line-strong);
    display:flex;align-items:center;justify-content:center;
  }
  .tl-step.done .tl-dot{background:var(--ink);border-color:var(--ink);}
  .tl-step.done.stamp-orange .tl-dot{background:var(--stamp-orange);border-color:var(--stamp-orange);}
  .tl-step.done.stamp-green .tl-dot{background:var(--stamp-green);border-color:var(--stamp-green);}
  .tl-dot .dotmark{width:6px;height:6px;border-radius:50%;background:var(--paper);}
  .tl-label{font-size:14px;font-weight:700;}
  .tl-sub{font-size:12px;color:var(--muted-dark);margin-top:2px;font-family:'JetBrains Mono',monospace;}
  .tl-pending{opacity:0.45;}

  /* Stamp graphic */
  .stamp-graphic{
    display:inline-flex;align-items:center;gap:6px;
    border:2px solid currentColor;
    border-radius:6px;
    padding:4px 10px;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;font-weight:700;
    letter-spacing:1px;
    text-transform:uppercase;
    transform:rotate(-2deg);
    margin-top:8px;
  }
  .stamp-graphic.orange{color:var(--stamp-orange);}
  .stamp-graphic.green{color:var(--stamp-green);}

  .photo-thumb{
    width:100%;
    border-radius:8px;
    margin-top:10px;
    border:1px solid var(--line);
    display:block;
  }
  .sig-thumb{
    width:100%;
    max-width:220px;
    background:#fff;
    border:1px solid var(--line);
    border-radius:8px;
    margin-top:10px;
    display:block;
  }

  .card{
    background:var(--paper-raised);
    border:1px solid var(--line);
    border-radius:10px;
    padding:16px;
    margin-bottom:14px;
  }
  .box-list-row{
    display:flex;justify-content:space-between;align-items:center;
    padding:8px 0;
    border-bottom:1px solid var(--paper-dim);
    font-size:14px;
  }
  .box-list-row:last-child{border-bottom:none;}
  .qty-badge{
    font-family:'JetBrains Mono',monospace;
    font-size:13px;font-weight:600;
    background:var(--paper-dim);
    padding:2px 9px;
    border-radius:12px;
  }

  .add-box-row{display:flex;gap:8px;margin-bottom:10px;}
  .add-box-row input{margin-bottom:0;flex:1;}
  .add-box-row input.qty-input{flex:0 0 70px;}
  .icon-btn{
    width:44px;height:44px;flex-shrink:0;
    border-radius:8px;
    border:1px solid var(--line-strong);
    background:var(--paper-raised);
    font-size:18px;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
  }

  canvas#sigCanvas{
    width:100%;
    height:180px;
    background:#fff;
    border:1.5px dashed var(--line-strong);
    border-radius:8px;
    touch-action:none;
    display:block;
  }

  .fab{
    position:fixed;
    bottom:96px;right:max(20px, calc((100vw - 480px)/2 + 20px));
    width:56px;height:56px;
    border-radius:50%;
    background:var(--stamp-orange);
    color:#fff;
    border:none;
    font-size:26px;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 3px 10px rgba(0,0,0,0.25);
    cursor:pointer;
    z-index:45;
  }
  .fab:active{transform:scale(0.93);}

  /* Modal */
  .modal-overlay{
    position:fixed;inset:0;
    background:rgba(26,29,41,0.55);
    z-index:100;
    display:flex;align-items:flex-end;
    justify-content:center;
  }
  .modal-sheet{
    background:var(--paper);
    width:100%;max-width:480px;
    border-radius:18px 18px 0 0;
    max-height:88vh;
    overflow-y:auto;
    padding:18px 18px calc(20px + env(safe-area-inset-bottom));
  }
  .modal-handle{
    width:36px;height:4px;background:var(--line-strong);border-radius:4px;
    margin:0 auto 16px;
  }
  .modal-title{font-size:18px;font-weight:700;margin:0 0 16px;}

  .filter-pills{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:2px;}
  .filter-pill{
    flex-shrink:0;
    font-size:12.5px;font-weight:600;
    padding:7px 13px;
    border-radius:20px;
    border:1px solid var(--line-strong);
    background:var(--paper-raised);
    color:var(--muted-dark);
    cursor:pointer;
    white-space:nowrap;
  }
  .filter-pill.active{background:var(--ink);color:var(--paper);border-color:var(--ink);}

  .admin-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
  .stat-box{
    background:var(--paper-raised);
    border:1px solid var(--line);
    border-radius:10px;
    padding:14px;
  }
  .stat-num{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700;}
  .stat-label{font-size:11.5px;color:var(--muted-dark);margin-top:2px;}

  .toast{
    position:fixed;
    bottom:96px;left:50%;
    transform:translateX(-50%);
    background:var(--ink);
    color:var(--paper);
    padding:11px 20px;
    border-radius:24px;
    font-size:13.5px;font-weight:600;
    z-index:200;
    box-shadow:0 4px 14px rgba(0,0,0,0.3);
    max-width:80%;
    text-align:center;
  }

  .note-text{font-size:12.5px;color:var(--muted-dark);line-height:1.5;margin-top:4px;}
  .file-input-wrap{
    border:1.5px dashed var(--line-strong);
    border-radius:10px;
    padding:24px;
    text-align:center;
    cursor:pointer;
  }
  .file-input-wrap .ficon{font-size:26px;display:block;margin-bottom:8px;opacity:0.6;}
  .file-input-wrap input{display:none;}

  .spinner{
    width:16px;height:16px;
    border:2px solid rgba(255,255,255,0.3);
    border-top-color:#fff;
    border-radius:50%;
    animation:spin 0.7s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  ::-webkit-scrollbar{display:none;}
</style>
</head>
<body>
<div id="app"></div>

<script>
(function(){

// ---------- Storage helpers ----------
async function dbGet(key, shared){
  try{
    const r = await window.storage.get(key, shared);
    return r ? JSON.parse(r.value) : null;
  }catch(e){ return null; }
}
async function dbSet(key, value, shared){
  try{
    await window.storage.set(key, JSON.stringify(value), shared);
    return true;
  }catch(e){ return false; }
}
async function dbList(prefix, shared){
  try{
    const r = await window.storage.list(prefix, shared);
    return r ? r.keys : [];
  }catch(e){ return []; }
}

// ---------- App state ----------
const STORES = [
  {code:"033", name:"PLAYA"},
  {code:"037", name:"PLAZA MOGÁN"},
  {code:"040", name:"PUERTO"},
  {code:"041", name:"PUERTO RICO"},
  {code:"042", name:"NEPTUNO"},
  {code:"045", name:"SAN AGUSTIN"},
];
function storeLabel(s){ return s.code + ' — ' + s.name; }
function storeByCode(code){ return STORES.find(s=>s.code===code); }
function storeLabelFromCode(code){ const s = storeByCode(code); return s ? storeLabel(s) : code; }

let state = {
  screen: 'login',       // login | home | odt_detail | create | profile
  role: null,             // operations | driver | store | admin
  userName: null,
  storeAssigned: null,    // for store role
  odts: [],               // loaded from shared storage
  activeOdtId: null,
  loading: true,
  modal: null,            // {type:'create'|'load'|'deliver', odtId}
  filter: 'all',
  toast: null,
};

function isValidODTFormat(v){
  return /\S/.test(v);
}

function showToast(msg){
  state.toast = msg;
  render();
  setTimeout(()=>{ state.toast = null; render(); }, 2200);
}

// ---------- Data load/save ----------
async function loadAllODTs(){
  const keys = await dbList('odt:', true);
  const odts = [];
  for(const k of keys){
    const v = await dbGet(k, true);
    if(v) odts.push(v);
  }
  odts.sort((a,b)=> b.createdAt - a.createdAt);
  state.odts = odts;
}

async function saveODT(odt){
  await dbSet('odt:' + odt.id, odt, true);
}

// ---------- Init ----------
async function init(){
  const session = await dbGet('session', false);
  if(session){
    state.role = session.role;
    state.userName = session.userName;
    state.storeAssigned = session.storeAssigned || null;
    state.screen = 'home';
  }
  await loadAllODTs();
  state.loading = false;
  render();
}

async function saveSession(){
  await dbSet('session', {role:state.role, userName:state.userName, storeAssigned:state.storeAssigned}, false);
}

// ---------- Render root ----------
function render(){
  const app = document.getElementById('app');
  app.innerHTML = '';
  if(state.loading){
    app.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:var(--muted);font-size:13px;">Loading manifest data…</div>';
    return;
  }
  if(state.screen === 'login'){
    renderLogin(app);
    return;
  }
  renderTopbar(app);
  const content = document.createElement('div');
  content.className = 'content';
  app.appendChild(content);

  if(state.screen === 'home') renderHome(content);
  if(state.screen === 'odt_detail') renderOdtDetail(content);

  renderTabbar(app);

  if(state.modal){
    renderModal(app);
  }
  if(state.toast){
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = state.toast;
    app.appendChild(t);
  }
}

// ---------- Login screen ----------
function renderLogin(app){
  const wrap = document.createElement('div');
  wrap.className = 'login-wrap';
  wrap.innerHTML = `
    <div class="login-mark">ODT</div>
    <h1 class="login-title">Dispatch Manifest</h1>
    <p class="login-sub">SIGN IN TO CONTINUE</p>
    <label class="field-label">Your role</label>
    <div class="role-grid" id="roleGrid">
      ${roleCardHtml('operations','📦','Operations','Creates ODTs')}
      ${roleCardHtml('driver','🚚','Driver','Loads & transports')}
      ${roleCardHtml('store','🏬','Store','Receives goods')}
      ${roleCardHtml('admin','📋','Admin','Full overview')}
    </div>
    <div id="loginFields"></div>
  `;
  app.appendChild(wrap);

  let selectedRole = null;

  wrap.querySelectorAll('.role-card').forEach(card=>{
    card.addEventListener('click', ()=>{
      selectedRole = card.dataset.role;
      wrap.querySelectorAll('.role-card').forEach(c=>c.classList.remove('selected'));
      card.classList.add('selected');
      renderLoginFields(selectedRole);
    });
  });

  function renderLoginFields(role){
    const fieldsDiv = wrap.querySelector('#loginFields');
    let storeSelect = '';
    if(role === 'store'){
      storeSelect = `
        <label class="field-label">Your store</label>
        <select id="storeSelect">
          ${STORES.map(s=>`<option value="${s.code}">${storeLabel(s)}</option>`).join('')}
        </select>
      `;
    }
    fieldsDiv.innerHTML = `
      <label class="field-label">Your name</label>
      <input type="text" id="nameInput" placeholder="e.g. María González" />
      ${storeSelect}
      <button class="btn btn-stamp" id="loginBtn" style="margin-top:6px;">Sign in</button>
    `;
    fieldsDiv.querySelector('#loginBtn').addEventListener('click', async ()=>{
      const name = fieldsDiv.querySelector('#nameInput').value.trim();
      if(!name){ showToastRaw('Enter your name to continue'); return; }
      state.role = role;
      state.userName = name;
      if(role === 'store'){
        state.storeAssigned = fieldsDiv.querySelector('#storeSelect').value;
      }
      state.screen = 'home';
      await saveSession();
      render();
    });
  }

  function showToastRaw(msg){
    let t = wrap.querySelector('.inline-warn');
    if(!t){
      t = document.createElement('p');
      t.className = 'inline-warn';
      t.style = 'color:var(--stamp-red);font-size:12.5px;text-align:center;margin-top:10px;';
      wrap.appendChild(t);
    }
    t.textContent = msg;
  }
}

function roleCardHtml(role, icon, name, desc){
  return `<div class="role-card" data-role="${role}">
    <span class="ricon">${icon}</span>
    <div class="rname">${name}</div>
    <div class="rdesc">${desc}</div>
  </div>`;
}

// ---------- Topbar ----------
function renderTopbar(app){
  const bar = document.createElement('div');
  bar.className = 'topbar';
  const storeObj = state.storeAssigned ? storeByCode(state.storeAssigned) : null;
  const roleLabels = {operations:'Operations', driver:'Driver', store:'Store · ' + (storeObj ? storeLabel(storeObj) : ''), admin:'Admin'};
  bar.innerHTML = `
    <div class="brand" id="brandHomeBtn" role="button" aria-label="Go to main page" style="cursor:pointer;">
      <div class="brand-mark">ODT</div>
      <div>
        <div class="title">Dispatch Manifest</div>
        <div class="subtitle">${roleLabels[state.role]}</div>
      </div>
    </div>
    <div class="user-pill" id="userPill">${state.userName} ⌄</div>
  `;
  app.appendChild(bar);
  bar.querySelector('#brandHomeBtn').addEventListener('click', ()=>{
    state.screen='home'; state.activeOdtId=null; state.modal=null; render();
  });
  bar.querySelector('#userPill').addEventListener('click', ()=>{
    if(confirm('Sign out of ' + state.userName + '\'s session?')){
      dbSet('session', null, false);
      state.role=null; state.userName=null; state.storeAssigned=null; state.screen='login';
      render();
    }
  });
}

// ---------- Tabbar ----------
function renderTabbar(app){
  const bar = document.createElement('div');
  bar.className = 'tabbar';
  bar.innerHTML = `
    <div class="tab-item ${state.screen==='home'?'active':''}" id="tabHome">
      <span class="ticon">📋</span><span>Manifest</span>
    </div>
  `;
  app.appendChild(bar);
  bar.querySelector('#tabHome').addEventListener('click', ()=>{
    state.screen='home'; state.activeOdtId=null; render();
  });

  if(state.role === 'operations'){
    const fab = document.createElement('button');
    fab.className = 'fab';
    fab.textContent = '+';
    fab.setAttribute('aria-label','Create new ODT');
    fab.addEventListener('click', ()=>{ state.modal = {type:'create'}; render(); });
    app.appendChild(fab);
  }
}

// ---------- Home: list of ODTs filtered by role ----------
function visibleODTs(){
  let list = state.odts;
  if(state.role === 'store'){
    list = list.filter(o => o.destinationStore === state.storeAssigned);
  }
  if(state.filter !== 'all'){
    list = list.filter(o => o.status === state.filter);
  }
  return list;
}

function renderHome(content){
  const head = document.createElement('div');
  head.className = 'section-head';
  const storeObj = state.storeAssigned ? storeByCode(state.storeAssigned) : null;
  const title = state.role==='store' ? 'Incoming to ' + (storeObj ? storeLabel(storeObj) : '') : 'All ODTs';
  head.innerHTML = `<h2>${title}</h2><span class="count">${visibleODTs().length} shown</span>`;
  content.appendChild(head);

  if(state.role === 'admin'){
    renderAdminStats(content);
  }

  // Filters
  const filterRow = document.createElement('div');
  filterRow.className = 'filter-pills';
  const filters = [
    {k:'all', label:'All'},
    {k:'created', label:'Created'},
    {k:'loaded', label:'Loaded'},
    {k:'delivered', label:'Delivered'},
    {k:'discrepancy', label:'Discrepancy'},
  ];
  filters.forEach(f=>{
    const pill = document.createElement('div');
    pill.className = 'filter-pill' + (state.filter===f.k ? ' active':'');
    pill.textContent = f.label;
    pill.addEventListener('click', ()=>{ state.filter = f.k; render(); });
    filterRow.appendChild(pill);
  });
  content.appendChild(filterRow);

  const list = visibleODTs();
  if(list.length === 0){
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.innerHTML = `
      <span class="eicon">📭</span>
      <div class="etitle">Nothing here yet</div>
      <div class="edesc">${state.role==='operations' ? 'Tap the + button to create your first ODT.' : 'New ODTs will appear here once created.'}</div>
    `;
    content.appendChild(empty);
    return;
  }

  list.forEach(odt=>{
    content.appendChild(renderTicketCard(odt));
  });
}

function renderAdminStats(content){
  const grid = document.createElement('div');
  grid.className = 'admin-stat-grid';
  const total = state.odts.length;
  const inTransit = state.odts.filter(o=>o.status==='loaded').length;
  const delivered = state.odts.filter(o=>o.status==='delivered').length;
  const disc = state.odts.filter(o=>o.status==='discrepancy').length;
  grid.innerHTML = `
    <div class="stat-box"><div class="stat-num">${total}</div><div class="stat-label">Total ODTs</div></div>
    <div class="stat-box"><div class="stat-num" style="color:var(--stamp-orange-dark);">${inTransit}</div><div class="stat-label">In transit</div></div>
    <div class="stat-box"><div class="stat-num" style="color:var(--stamp-green-dark);">${delivered}</div><div class="stat-label">Delivered</div></div>
    <div class="stat-box"><div class="stat-num" style="color:${disc>0?'var(--stamp-red-dark)':'var(--muted)'};">${disc}</div><div class="stat-label">Discrepancies</div></div>
  `;
  content.appendChild(grid);
}

function statusLabel(s){
  return {created:'Created', loaded:'In transit', delivered:'Delivered', discrepancy:'Discrepancy'}[s] || s;
}

function renderTicketCard(odt){
  const card = document.createElement('div');
  card.className = 'ticket';
  const totalBoxes = odt.boxes.reduce((sum,b)=>sum+b.qty,0);
  card.innerHTML = `
    <div class="ticket-top">
      <div>
        <div class="ticket-odt mono">${odt.id}</div>
        <div class="ticket-route">${odt.originLabel} → ${storeLabelFromCode(odt.destinationStore)}</div>
      </div>
      <span class="status-chip status-${odt.status}">${statusLabel(odt.status)}</span>
    </div>
    <div class="ticket-tear"></div>
    <div class="ticket-bottom">
      <span>${totalBoxes} box${totalBoxes!==1?'es':''}</span>
      <span>${formatDate(odt.createdAt)}</span>
    </div>
  `;
  card.addEventListener('click', ()=>{
    state.activeOdtId = odt.id;
    state.screen = 'odt_detail';
    render();
  });
  return card;
}

function formatDate(ts){
  const d = new Date(ts);
  return d.toLocaleDateString(undefined,{month:'short',day:'numeric'}) + ' ' + d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'});
}

// ---------- ODT Detail ----------
function renderOdtDetail(content){
  const odt = state.odts.find(o=>o.id===state.activeOdtId);
  if(!odt){
    content.innerHTML = '<p>ODT not found.</p>';
    return;
  }

  const header = document.createElement('div');
  header.className = 'detail-header';
  header.innerHTML = `
    <button class="back-btn" id="backBtn" aria-label="Back">←</button>
    <div class="detail-odt mono">${odt.id}</div>
  `;
  content.appendChild(header);
  header.querySelector('#backBtn').addEventListener('click', ()=>{ state.screen='home'; render(); });

  const metaRow = document.createElement('div');
  metaRow.className = 'detail-meta-row';
  const totalBoxes = odt.boxes.reduce((s,b)=>s+b.qty,0);
  metaRow.innerHTML = `
    <span>${odt.originLabel} → ${storeLabelFromCode(odt.destinationStore)}</span>
    <span>${totalBoxes} boxes</span>
  `;
  content.appendChild(metaRow);

  // Box manifest
  const boxCard = document.createElement('div');
  boxCard.className = 'card';
  boxCard.innerHTML = `<div class="field-label" style="margin-bottom:8px;">Box manifest</div>` +
    odt.boxes.map(b=>`<div class="box-list-row"><span>${b.label}</span><span class="qty-badge mono">×${b.qty}</span></div>`).join('');
  content.appendChild(boxCard);

  // Timeline
  const tl = document.createElement('div');
  tl.className = 'timeline';

  // Step 1: created
  tl.appendChild(timelineStep({
    done:true,
    color:'',
    label:'ODT created',
    sub: `${odt.createdBy} · ${formatDate(odt.createdAt)}`,
    extra:null
  }));

  // Step 2: loaded
  if(odt.loadedAt){
    tl.appendChild(timelineStep({
      done:true,
      color:'stamp-orange',
      label:'Checked in on vehicle',
      sub: `${odt.loadedBy} · ${formatDate(odt.loadedAt)}${odt.vehicleId ? ' · ' + odt.vehicleId : ''}`,
      extra: `<div class="stamp-graphic orange">✓ Loaded</div>`
    }));
  } else {
    tl.appendChild(timelineStep({
      done:false,
      label:'Awaiting load check-in',
      sub: (state.role==='driver') ? 'Tap below to check in this load' : 'Pending driver action',
      extra: (state.role==='driver') ? `<button class="btn btn-stamp btn-sm" id="loadActionBtn" style="margin-top:8px;">Check in load</button>` : null
    }));
  }

  // Step 3: delivered
  if(odt.deliveredAt){
    let extraHtml = `<div class="stamp-graphic green">✓ Received</div>`;
    if(odt.signatureData){
      extraHtml += `<img class="sig-thumb" src="${odt.signatureData}" alt="Receiving signature" />`;
    }
    if(odt.photoData){
      extraHtml += `<img class="photo-thumb" src="${odt.photoData}" alt="Photo of received boxes" />`;
    }
    if(odt.deliveryNote){
      extraHtml += `<p class="note-text">Note: ${escapeHtml(odt.deliveryNote)}</p>`;
    }
    tl.appendChild(timelineStep({
      done:true,
      color:'stamp-green',
      label: odt.status==='discrepancy' ? 'Received — discrepancy noted' : 'Received at store',
      sub: `${odt.deliveredBy} · ${formatDate(odt.deliveredAt)}`,
      extra: extraHtml
    }));
  } else if(odt.loadedAt) {
    const canAct = state.role==='store' && state.storeAssigned===odt.destinationStore;
    tl.appendChild(timelineStep({
      done:false,
      label:'Awaiting store confirmation',
      sub: canAct ? 'Tap below to confirm receipt' : `Pending sign-off at ${storeLabelFromCode(odt.destinationStore)}`,
      extra: canAct ? `<button class="btn btn-green btn-sm" id="deliverActionBtn" style="margin-top:8px;">Confirm receipt</button>` : null
    }));
  } else {
    tl.appendChild(timelineStep({done:false, label:'Awaiting store confirmation', sub:'Vehicle not yet loaded', extra:null}));
  }

  content.appendChild(tl);

  const loadBtn = tl.querySelector('#loadActionBtn');
  if(loadBtn) loadBtn.addEventListener('click', ()=>{ state.modal={type:'load', odtId:odt.id}; render(); });
  const delBtn = tl.querySelector('#deliverActionBtn');
  if(delBtn) delBtn.addEventListener('click', ()=>{ state.modal={type:'deliver', odtId:odt.id}; render(); });
}

function timelineStep({done, color, label, sub, extra}){
  const div = document.createElement('div');
  div.className = 'tl-step ' + (done?'done':'tl-pending') + (color?(' '+color):'');
  div.innerHTML = `
    <div class="tl-dot">${done?'<div class="dotmark"></div>':''}</div>
    <div class="tl-label">${label}</div>
    <div class="tl-sub">${sub}</div>
    ${extra||''}
  `;
  return div;
}

function escapeHtml(s){
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ---------- Modals ----------
function renderModal(app){
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.addEventListener('click', (e)=>{ if(e.target===overlay){ state.modal=null; render(); } });
  const sheet = document.createElement('div');
  sheet.className = 'modal-sheet';
  sheet.addEventListener('click', e=>e.stopPropagation());
  overlay.appendChild(sheet);
  app.appendChild(overlay);

  sheet.innerHTML = '<div class="modal-handle"></div>';

  if(state.modal.type === 'create') renderCreateModal(sheet);
  if(state.modal.type === 'load') renderLoadModal(sheet);
  if(state.modal.type === 'deliver') renderDeliverModal(sheet);
}

// --- Create ODT modal (Operations) ---
function renderCreateModal(sheet){
  const title = document.createElement('div');
  title.className = 'modal-title';
  title.textContent = 'New ODT';
  sheet.appendChild(title);

  const form = document.createElement('div');
  form.innerHTML = `
    <label class="field-label">ODT number</label>
    <input type="text" id="odtNumber" class="mono" placeholder="Enter ODT number from system" autocapitalize="characters" />
    <div id="odtNumberWarn" class="note-text" style="display:none;color:var(--stamp-red);margin-top:-12px;margin-bottom:14px;">An ODT with this number already exists.</div>

    <label class="field-label">Destination store</label>
    <select id="destStore">${STORES.map(s=>`<option value="${s.code}">${storeLabel(s)}</option>`).join('')}</select>

    <label class="field-label">Origin / warehouse label</label>
    <input type="text" id="originLabel" placeholder="e.g. Central Warehouse" value="Central Warehouse" />

    <label class="field-label">Boxes in this ODT</label>
    <div id="boxRows"></div>
    <div class="add-box-row">
      <input type="text" id="newBoxLabel" placeholder="Box description (e.g. Footwear)" />
      <input type="text" id="newBoxQty" class="qty-input" placeholder="Qty" inputmode="numeric" />
      <div class="icon-btn" id="addBoxBtn" aria-label="Add box line">+</div>
    </div>
    <button class="btn btn-stamp" id="createBtn" style="margin-top:8px;">Create ODT</button>
  `;
  sheet.appendChild(form);

  const odtNumberInput = form.querySelector('#odtNumber');
  const odtNumberWarn = form.querySelector('#odtNumberWarn');
  odtNumberInput.addEventListener('input', ()=>{
    const v = odtNumberInput.value.trim();
    const exists = v && state.odts.some(o => o.id.toLowerCase() === v.toLowerCase());
    odtNumberWarn.style.display = exists ? 'block' : 'none';
  });

  let boxes = [];
  const boxRowsDiv = form.querySelector('#boxRows');

  function renderBoxRows(){
    boxRowsDiv.innerHTML = boxes.map((b,i)=>`
      <div class="box-list-row">
        <span>${escapeHtml(b.label)}</span>
        <span style="display:flex;align-items:center;gap:10px;">
          <span class="qty-badge mono">×${b.qty}</span>
          <span data-i="${i}" class="removeBoxBtn" style="cursor:pointer;color:var(--stamp-red);font-size:13px;">remove</span>
        </span>
      </div>
    `).join('');
    boxRowsDiv.querySelectorAll('.removeBoxBtn').forEach(el=>{
      el.addEventListener('click', ()=>{
        boxes.splice(parseInt(el.dataset.i),1);
        renderBoxRows();
      });
    });
  }

  form.querySelector('#addBoxBtn').addEventListener('click', ()=>{
    const label = form.querySelector('#newBoxLabel').value.trim();
    const qty = parseInt(form.querySelector('#newBoxQty').value) || 0;
    if(!label || qty<=0){ showToast('Enter a box description and quantity'); return; }
    boxes.push({label, qty});
    form.querySelector('#newBoxLabel').value='';
    form.querySelector('#newBoxQty').value='';
    renderBoxRows();
  });

  form.querySelector('#createBtn').addEventListener('click', async ()=>{
    const odtId = odtNumberInput.value.trim();
    if(!odtId){ showToast('Enter the ODT number from the system'); odtNumberInput.focus(); return; }
    if(state.odts.some(o => o.id.toLowerCase() === odtId.toLowerCase())){
      showToast('That ODT number already exists'); odtNumberInput.focus(); return;
    }
    if(boxes.length===0){ showToast('Add at least one box line'); return; }
    const btn = form.querySelector('#createBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Creating…';
    const odt = {
      id: odtId,
      originLabel: form.querySelector('#originLabel').value.trim() || 'Warehouse',
      destinationStore: form.querySelector('#destStore').value,
      boxes: boxes,
      status: 'created',
      createdBy: state.userName,
      createdAt: Date.now(),
      loadedBy:null, loadedAt:null, vehicleId:null,
      deliveredBy:null, deliveredAt:null, signatureData:null, photoData:null, deliveryNote:null,
    };
    await saveODT(odt);
    state.odts.unshift(odt);
    state.modal = null;
    showToast(`${odt.id} created`);
    render();
  });

  renderBoxRows();
}

// --- Load check-in modal (Driver) ---
function renderLoadModal(sheet){
  const odt = state.odts.find(o=>o.id===state.modal.odtId);
  const title = document.createElement('div');
  title.className = 'modal-title';
  title.textContent = 'Check in load';
  sheet.appendChild(title);

  const form = document.createElement('div');
  form.innerHTML = `
    <p class="note-text" style="margin-bottom:14px;">Confirming <strong>${odt.id}</strong> (${odt.boxes.reduce((s,b)=>s+b.qty,0)} boxes) is loaded for delivery to <strong>${storeLabelFromCode(odt.destinationStore)}</strong>.</p>
    <label class="field-label">Vehicle / plate</label>
    <input type="text" id="vehicleId" placeholder="e.g. Van 3 — 4521 GLM" />
    <button class="btn btn-stamp" id="confirmLoadBtn">Confirm loaded on vehicle</button>
  `;
  sheet.appendChild(form);

  form.querySelector('#confirmLoadBtn').addEventListener('click', async ()=>{
    const btn = form.querySelector('#confirmLoadBtn');
    btn.disabled=true; btn.innerHTML = '<span class="spinner"></span> Saving…';
    odt.status = 'loaded';
    odt.loadedBy = state.userName;
    odt.loadedAt = Date.now();
    odt.vehicleId = form.querySelector('#vehicleId').value.trim() || null;
    await saveODT(odt);
    state.modal = null;
    showToast(`${odt.id} checked in as loaded`);
    render();
  });
}

// --- Deliver / receive modal (Store) — signature + photo ---
function renderDeliverModal(sheet){
  const odt = state.odts.find(o=>o.id===state.modal.odtId);
  const title = document.createElement('div');
  title.className = 'modal-title';
  title.textContent = 'Confirm receipt';
  sheet.appendChild(title);

  const form = document.createElement('div');
  form.innerHTML = `
    <p class="note-text" style="margin-bottom:14px;">Receiving <strong>${odt.id}</strong> — ${odt.boxes.reduce((s,b)=>s+b.qty,0)} boxes from ${odt.originLabel}.</p>

    <label class="field-label">Everything as expected?</label>
    <div style="display:flex;gap:8px;margin-bottom:16px;">
      <button class="btn btn-outline btn-sm" id="okBtn" style="flex:1;">All correct</button>
      <button class="btn btn-danger-outline btn-sm" id="discBtn" style="flex:1;">Discrepancy</button>
    </div>
    <div id="noteWrap" style="display:none;">
      <label class="field-label">Describe the issue</label>
      <input type="text" id="noteInput" placeholder="e.g. 1 box missing, 1 damaged" />
    </div>

    <label class="field-label">Photo of received boxes</label>
    <div class="file-input-wrap" id="photoWrap">
      <span class="ficon">📷</span>
      <span id="photoPrompt">Tap to take or upload a photo</span>
      <input type="file" accept="image/*" capture="environment" id="photoInput" />
    </div>
    <img id="photoPreview" style="display:none;width:100%;border-radius:8px;margin-top:10px;" />

    <label class="field-label" style="margin-top:18px;">Signature</label>
    <canvas id="sigCanvas"></canvas>
    <button class="btn btn-ghost btn-sm" id="clearSigBtn" style="width:auto;margin-top:8px;">Clear signature</button>

    <button class="btn btn-green" id="submitReceiptBtn" style="margin-top:18px;">Sign &amp; confirm receipt</button>
  `;
  sheet.appendChild(form);

  let isDiscrepancy = false;
  let photoData = null;

  form.querySelector('#okBtn').addEventListener('click', ()=>{
    isDiscrepancy = false;
    form.querySelector('#okBtn').style.background='var(--ink)';
    form.querySelector('#okBtn').style.color='#fff';
    form.querySelector('#discBtn').style.background='transparent';
    form.querySelector('#discBtn').style.color='var(--stamp-red)';
    form.querySelector('#noteWrap').style.display='none';
  });
  form.querySelector('#discBtn').addEventListener('click', ()=>{
    isDiscrepancy = true;
    form.querySelector('#discBtn').style.background='var(--stamp-red)';
    form.querySelector('#discBtn').style.color='#fff';
    form.querySelector('#okBtn').style.background='transparent';
    form.querySelector('#okBtn').style.color='var(--ink)';
    form.querySelector('#noteWrap').style.display='block';
  });

  const photoInput = form.querySelector('#photoInput');
  form.querySelector('#photoWrap').addEventListener('click', ()=> photoInput.click());
  photoInput.addEventListener('change', (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev)=>{
      photoData = ev.target.result;
      const prev = form.querySelector('#photoPreview');
      prev.src = photoData;
      prev.style.display = 'block';
      form.querySelector('#photoPrompt').textContent = 'Photo captured — tap to retake';
    };
    reader.readAsDataURL(file);
  });

  // Signature canvas setup
  const canvas = form.querySelector('#sigCanvas');
  const ctx = canvas.getContext('2d');
  function resizeCanvas(){
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * 2;
    canvas.height = rect.height * 2;
    ctx.scale(2,2);
    ctx.lineWidth = 2.2;
    ctx.lineCap = 'round';
    ctx.strokeStyle = '#1A1D29';
  }
  setTimeout(resizeCanvas, 0);

  let drawing = false, lastX=0, lastY=0, hasDrawn=false;
  function getPos(e){
    const rect = canvas.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return {x: t.clientX-rect.left, y: t.clientY-rect.top};
  }
  function start(e){ e.preventDefault(); drawing=true; const p=getPos(e); lastX=p.x; lastY=p.y; }
  function move(e){
    if(!drawing) return;
    e.preventDefault();
    const p = getPos(e);
    ctx.beginPath();
    ctx.moveTo(lastX,lastY);
    ctx.lineTo(p.x,p.y);
    ctx.stroke();
    lastX=p.x; lastY=p.y;
    hasDrawn = true;
  }
  function end(){ drawing=false; }
  canvas.addEventListener('mousedown', start);
  canvas.addEventListener('mousemove', move);
  canvas.addEventListener('mouseup', end);
  canvas.addEventListener('touchstart', start);
  canvas.addEventListener('touchmove', move);
  canvas.addEventListener('touchend', end);

  form.querySelector('#clearSigBtn').addEventListener('click', ()=>{
    ctx.clearRect(0,0,canvas.width,canvas.height);
    hasDrawn = false;
  });

  form.querySelector('#submitReceiptBtn').addEventListener('click', async ()=>{
    if(!hasDrawn){ showToast('Please sign before confirming'); return; }
    const btn = form.querySelector('#submitReceiptBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Saving…';

    odt.status = isDiscrepancy ? 'discrepancy' : 'delivered';
    odt.deliveredBy = state.userName;
    odt.deliveredAt = Date.now();
    odt.signatureData = canvas.toDataURL('image/png');
    odt.photoData = photoData;
    odt.deliveryNote = isDiscrepancy ? (form.querySelector('#noteInput').value.trim() || 'Discrepancy reported') : null;

    await saveODT(odt);
    state.modal = null;
    showToast(`${odt.id} marked as received`);
    render();
  });
}

init();
})();
</script>
